<!DOCTYPE html>
<html>
  <body>
    <h3 id="status">Checking connection...</h3>

    <script>
      fetch("https://ip-logger.linusaldrich-bustamante.workers.dev/ping")
        .then(res => res.text())
        .then(text => {
          document.getElementById("status").innerText = "Worker OK: " + text;
        })
        .catch(err => {
          console.log("Fetch error:", err);
          document.getElementById("status").innerText = "Worker FAILED";
        });
    </script>
  </body>
</html>
